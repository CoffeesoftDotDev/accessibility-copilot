name: Azure Static Web Apps CI/CD

# Deploys the album-viewer app to Azure Static Web Apps.
# - Pushes to `main`      -> production environment (stable URL)
# - Pull requests to main -> a dedicated preview/staging environment per PR
#   so you can run the Accessibility Scanner against both versions.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_GRASS_0AE58DF03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integration (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "SamplesAndTest/album-viewer" # App source code path
          api_location: "" # Api source code path - optional (app uses a mock service)
          output_location: "dist" # Built app content directory (Vite default)
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_GRASS_0AE58DF03 }}
          action: "close"
