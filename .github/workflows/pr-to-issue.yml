name: Create Issue for Pull Request

on:
  pull_request:
    types: [opened]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
      repository-projects: read
    
    steps:
      - name: Create Issue for PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // First, create the issue and try assigning Copilot directly during creation
            let issue;
            try {
              console.log('Method 0: Creating issue with Copilot assigned from the start');
              const { data: issueWithCopilot } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Review PR #${pr.number}: ${pr.title}`,
                body: `## 🔗 Linked Pull Request
            
            **PR:** #${pr.number} - ${pr.title}
            **Author:** @${pr.user.login}
            **URL:** ${pr.html_url}
            `,
                labels: ['neurodiversity-check'],
                assignees: ['copilot']
              });
              
              issue = issueWithCopilot;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `🤖 Review issue created: #${issue.number}\n\n✅ Issue has been assigned to Copilot coding agent for automated review.`
              });
              
              console.log('Successfully created issue with Copilot assigned from the start');
              return;
              
            } catch (createError) {
              console.log('Creating issue with Copilot assignment failed:', createError.message);
              
              // Fallback: create issue without assignees
              const { data: issueWithoutAssignees } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Review PR #${pr.number}: ${pr.title}`,
                body: `## 🔗 Linked Pull Request
            
            **PR:** #${pr.number} - ${pr.title}
            **Author:** @${pr.user.login}
            **URL:** ${pr.html_url}
            `,
                labels: ['neurodiversity-check']
              });
              
              issue = issueWithoutAssignees;
            }

            // Now assign the issue to Copilot using multiple methods
            try {
              console.log('Attempting to assign issue to Copilot...');
              
              // Method 1: Try direct assignment with the exact Copilot username
              try {
                console.log('Trying Method 1: Direct REST API assignment with copilot username');
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: ['github-copilot[bot]']
                });
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `🤖 Review issue created: #${issue.number}\n\n✅ Issue has been assigned to Copilot coding agent for automated review.`
                });
                
                console.log('Successfully assigned issue to Copilot using Method 1');
                return;
                
              } catch (method1Error) {
                console.log('Method 1 failed:', method1Error.message);
              }

              // Method 2: Try with copilot username without [bot]
              try {
                console.log('Trying Method 2: Direct REST API assignment with copilot');
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: ['copilot']
                });
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `🤖 Review issue created: #${issue.number}\n\n✅ Issue has been assigned to Copilot coding agent for automated review.`
                });
                
                console.log('Successfully assigned issue to Copilot using Method 2');
                return;
                
              } catch (method2Error) {
                console.log('Method 2 failed:', method2Error.message);
              }

              // Method 3: GraphQL approach to find and assign Copilot
              console.log('Trying Method 3: GraphQL approach');
              const repoQuery = `
                query {
                  repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                    id
                    suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 100) {
                      nodes {
                        login
                        __typename
                        ... on Bot {
                          id
                        }
                        ... on User {
                          id
                        }
                      }
                    }
                  }
                }
              `;

              const repoResult = await github.graphql(repoQuery);
              
              // Debug: Log all available actors
              console.log('Available suggested actors:', JSON.stringify(repoResult.repository.suggestedActors.nodes, null, 2));
              
              // Look for Copilot with different possible login names
              const copilotBot = repoResult.repository.suggestedActors.nodes.find(
                actor => {
                  const login = actor.login.toLowerCase();
                  return login === 'copilot-swe-agent' || 
                         login === 'copilot' || 
                         login === 'github-copilot[bot]' ||
                         login.includes('copilot');
                }
              );

              if (!copilotBot) {
                console.log('Copilot coding agent is not available in this repository or not found in suggested actors');
                console.log('Available actors:', repoResult.repository.suggestedActors.nodes.map(actor => actor.login));
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `🤖 Review issue created: #${issue.number}\n\n⚠️ Note: Copilot coding agent was not found in the repository's suggested actors. Available actors: ${repoResult.repository.suggestedActors.nodes.map(actor => actor.login).join(', ')}`
                });
                return;
              }

              // Get the issue ID in GraphQL format
              const issueQuery = `
                query {
                  repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                    issue(number: ${issue.number}) {
                      id
                      title
                    }
                  }
                }
              `;

              const issueResult = await github.graphql(issueQuery);
              const issueId = issueResult.repository.issue.id;

              // Assign the issue to Copilot
              const assignMutation = `
                mutation {
                  replaceActorsForAssignable(input: {
                    assignableId: "${issueId}", 
                    actorIds: ["${copilotBot.id}"]
                  }) {
                    assignable {
                      ... on Issue {
                        id
                        title
                        assignees(first: 10) {
                          nodes {
                            login
                          }
                        }
                      }
                    }
                  }
                }
              `;

              await github.graphql(assignMutation);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `🤖 Review issue created: #${issue.number}\n\n✅ Issue has been assigned to Copilot coding agent for automated review.`
              });

            } catch (error) {
              console.error('Error assigning issue to Copilot:', error);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `🤖 Review issue created: #${issue.number}\n\n⚠️ Failed to assign to Copilot coding agent: ${error.message}`
              });
            }
