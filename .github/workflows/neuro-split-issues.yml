name: Pull request review issues creation
on: 
  pull_request:
    types: [ready_for_review]
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read
  models: read

jobs:
  test_action:
    runs-on: ubuntu-latest
    outputs: 
      report: ${{ steps.pr_report_details.outputs.report }}
      issues: ${{ steps.gen_issues.outputs.issues }}
      repo: ${{ steps.get_context.outputs.repo }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get Context
        id: get_context
        run: |-
          echo "repo=${{github.repository}}" >> "$GITHUB_OUTPUT"
          echo "$GITHUB_CONTEXT"
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}

      - name: Install gh-models extension
        run: gh extension install https://github.com/github/gh-models

      - name: Get PR report details
        if: contains(join(github.event.issue.labels.*.name, ','), 'neuro-test')
        id: pr_report_details
        run: |-
          # Déterminer le numéro (PR review event vs issue event)
          ISSUE_NB="${{ github.event.pull_request.number || github.event.issue.number }}"
          if [ -z "$ISSUE_NB" ]; then
            echo "Aucun numéro d'issue/PR détecté dans ce type d'événement."
            echo "report={}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JSON_MIN=$(gh issue view "$ISSUE_NB" --json number,title,body,url | jq -c .)
          printf 'report=%s\n' "$JSON_MIN" >> "$GITHUB_OUTPUT"
      - name: Generate Issue Descriptions
        if: contains(join(github.event.issue.labels.*.name, ','), 'neuro-test')
        id: gen_issues
        run: |-
          echo "getting available labels for current repo" 
          labels="$(gh label list --repo "$REPO" --json name,description)"
          
          echo "Running model with prompt file: $PROMPTS_FILE"
          # Exécute le modèle
          printf '%s\n' "$CONTENT" | gh models run --file "$PROMPTS_FILE" --var labels="$labels"> issues.json
          cat issues.json
          # echo "issues=$(cat issues.json | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "$GITHUB_OUTPUT"
          if jq -e '.issues' issues.json > /dev/null; then
            issues=$(jq -c '.issues' issues.json)
            echo "issues=$issues" >> "$GITHUB_OUTPUT"
          else
            echo "No valid 'issues' array found in model output."
            echo "issues=[]" >> "$GITHUB_OUTPUT"
          fi
        env:
          PROMPTS_FILE: .github/prompts/issue-split.prompt.yml
          CONTENT: ${{ steps.pr_report_details.outputs.report }}
          REPO: ${{ steps.get_context.outputs.repo }}
  create_issues:
    needs: test_action
    if: ${{ needs.test_action.outputs.issues != '' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        issue: ${{ fromJson(needs.test_action.outputs.issues) }}
    steps:
      - name: Create GitHub Issue
        run: |
          echo "Raw ISSUE input:"
          echo "$ISSUE"
          echo "Repo Name :"
          echo "$REPO"
      
          # Extract fields safely
          title="$(echo "$ISSUE" | jq -r '.title')"
          body="$(echo "$ISSUE" | jq -r '.body')"
          label="$(echo "$ISSUE" | jq -r '.label')"
          repo="$(echo "$REPO")"
      
          # Defensive checks
          if [[ -z "$title" || -z "$body" ]]; then
            echo "Skipping empty or invalid issue..."
            exit 0
          fi
      
          echo "Creating issue with title: $title"
          echo "Label: $label"

          # Authenticating GH CLI with PAT to be able to assign Copilot to work on an issue 
          echo "$PAT" | gh auth login --with-token 
      
          # Use gh issue create with safe quoting
          gh issue create \
            --title "$title" \
            --body "$body" \
            --label "$label" \
            --repo "$repo" \
            --assignee "@copilot"
        env:
          # GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ toJson(matrix.issue) }}
          REPO: ${{ needs.test_action.outputs.repo }}
          PAT: ${{secrets.PAT}}
